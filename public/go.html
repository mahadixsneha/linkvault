<script>
const params = new URLSearchParams(location.search);
let token = params.get('token');
let currentStep = parseInt(params.get('step')) || 1;
let totalSteps = 5;
let timerSeconds = 10;

async function init() {
  try {
    const r = await fetch('/api/settings/public');
    const d = await r.json();
    const a = d.adSettings || {};
    totalSteps = a.layers || 5;
    timerSeconds = a.timerSeconds || 10;
  } catch(e) {}
  renderDots();
  renderStep(currentStep);
}

function renderDots() {
  let h = '';
  for (let i = 1; i <= totalSteps; i++)
    h += `<div class="dot ${i<currentStep?'done':i===currentStep?'active':''}"></div>`;
  document.getElementById('step-dots').innerHTML = h;
}

function renderStep(s) {
  if (s === 1) step1();
  else if (s === 2) step2();
  else if (s === 3) step3();
  else if (s === 4) step4();
  else if (s >= totalSteps) stepFinal();
  else stepGeneric(s);
}

// ── STEP 1: Countdown ──
function step1() {
  const r = 46, circ = 2 * Math.PI * r;
  document.getElementById('step-content').innerHTML = `
    <div class="step-title">Please wait</div>
    <div class="step-sub">Your link is being prepared securely</div>
    <svg class="circle-timer" viewBox="0 0 110 110">
      <defs><linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#6c63ff"/><stop offset="100%" stop-color="#a855f7"/>
      </linearGradient></defs>
      <circle class="circle-bg" cx="55" cy="55" r="${r}"/>
      <circle class="circle-fill" id="cf" cx="55" cy="55" r="${r}" stroke-dasharray="${circ}" stroke-dashoffset="0"/>
      <text x="55" y="62" text-anchor="middle" fill="#6c63ff" font-family="Syne" font-weight="800" font-size="28" id="ct">${timerSeconds}</text>
    </svg>
    <button class="btn btn-primary" id="cbtn" disabled onclick="advance()">Continue →</button>`;
  let rem = timerSeconds;
  const iv = setInterval(() => {
    rem--;
    const cf=document.getElementById('cf'),ct=document.getElementById('ct'),cb=document.getElementById('cbtn');
    if(cf) cf.style.strokeDashoffset = circ - circ*(rem/timerSeconds);
    if(ct) ct.textContent = rem;
    if(rem<=0){clearInterval(iv);if(cb){cb.disabled=false;cb.textContent='Continue →';}}
  }, 1000);
}

// ── STEP 2: Smartlink trigger ──
function step2() {
  document.getElementById('step-content').innerHTML = `
    <div class="step-title">Almost there!</div>
    <div class="step-sub">Tap continue to proceed</div>
    <button class="btn btn-primary" onclick="step2go()">Continue →</button>`;
}
function step2go() {
  window.open('https://www.profitablecpmratenetwork.com/bktp7t9d99?key=1d7db7242ba85a8b7605452a8d6fb5e0','_blank');
  setTimeout(() => advance(), 700);
}

// ── STEP 3 ──
function step3() {
  document.getElementById('step-content').innerHTML = `
    <div class="step-title">One more step</div>
    <div class="step-sub">Almost done!</div>
    <button class="btn btn-primary" onclick="advance()" style="margin-top:8px">Continue →</button>`;
}

// ── STEP 4: Loading ──
function step4() {
  document.getElementById('step-content').innerHTML = `
    <div class="step-title">Loading your link</div>
    <div class="spinner"></div>
    <div style="color:#8892a4;font-size:13px">Preparing destination...</div>`;
  setTimeout(() => advance(), 2500);
}

// ── FINAL STEP ──
function stepFinal() {
  document.getElementById('step-content').innerHTML = `
    <div style="font-size:36px;margin-bottom:10px">✨</div>
    <div class="step-title">Your link is ready!</div>
    <div class="step-sub">Click below to continue</div>
    <button class="btn btn-glow" onclick="getFinal()">🔓 Get My Link</button>`;
}

function stepGeneric(s) {
  document.getElementById('step-content').innerHTML = `<div class="step-title">Step ${s}</div><div class="spinner"></div>`;
  setTimeout(() => advance(), 1500);
}

async function advance() {
  try {
    const r = await fetch('/api/links/step', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({token, step:currentStep})
    });
    const d = await r.json();
    if(d.error){
      document.getElementById('step-content').innerHTML=`<p style="color:#f87171;font-size:13px;margin-top:8px">Link expired. Please go back and try again.</p>`;
      return;
    }
    if(d.destination){window.location.href=d.destination;return;}
    token=d.newToken;currentStep=d.nextStep;
    renderDots();renderStep(currentStep);
  } catch(e){console.error(e);}
}

async function getFinal(){
  const b=document.querySelector('.btn-glow');if(b)b.textContent='Loading...';
  await advance();
}

init();
</script>
